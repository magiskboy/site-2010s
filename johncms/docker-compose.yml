services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - johncms_incfiles:/var/www/html/incfiles
      - johncms_files:/var/www/html/files

  db:
    image: mysql:5.7
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-johncms}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-johncms}
      MYSQL_USER: ${MYSQL_USER:-johncms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-johncms}
    volumes:
      - johncms_mysql:/var/lib/mysql
      - ./mysql.cnf:/etc/mysql/conf.d/johncms.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-johncms}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  johncms_mysql:
  johncms_incfiles:
  johncms_files:
